<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ben genin</title>

  <!-- 🐣 Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>">

  <!-- Gentle / elegant typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #fafafa;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: rgba(0,0,0,0.12);
      --divider: rgba(0,0,0,0.10);
      --shadow: 0 1px 2px rgba(0,0,0,0.04);
      --linkedin: #0A66C2;
    }

    html { scroll-behavior: smooth; }

    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      font-size: 17px;
      letter-spacing: 0.35px;
      padding: 60px 20px 100px;
      text-align:center;
    }

    h1{
      font-size: 44px;
      font-weight: 300;
      margin:0;
      letter-spacing: -0.4px;
    }
    h1 strong{ font-weight: 600; }

    .tagline{
      margin-top: 18px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.25px;
      max-width: 680px;
      margin-left:auto;
      margin-right:auto;
      line-height: 1.5;
    }

    .tagline a{
      vertical-align: middle;
      text-decoration: none;
    }
    .tagline svg{
      margin-left: 6px;
      vertical-align: -2px;
    }

    /* “pillars” links */
    nav{ margin-top: 34px; }

    .pillars{
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: center;
      border: 1px solid var(--divider);
      border-radius: 999px;
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .pillar{
      flex: 1;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      text-decoration: none;
      color: var(--text);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.35px;

      transition: background 180ms ease, color 180ms ease;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pillar + .pillar{
      border-left: 1px solid var(--divider);
    }

    /* Hover behavior you want: black background, white text */
    .pillar:hover,
    .pillar:focus-visible{
      background: #111;
      color: #fff;
      outline: none;
    }

    /* Make emoji/text follow the same color */
    .pillar .icon{
      font-size: 18px;
      line-height: 1;
      filter: grayscale(0);
      transition: filter 180ms ease;
    }

    /* CTA pill */
    .cta{
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 6px 14px;

      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .cta:hover{ background: #f0f0f0; opacity: 0.95; }
    .cta:focus-visible{ outline: 2px solid #111; outline-offset: 2px; }

    /* Chat section */
    .chat-block{
      margin-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-wrapper{
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .chat-wrapper iframe{
      width: 100%;
      height: 360px;
      border: 0;
    }

    footer{ margin-top: 46px; }
    .footer-emoji{ font-size: 28px; opacity: 0.9; }
    .footer-text{ margin-top: 12px; font-size: 13px; color: #888; letter-spacing: 0.2px; }

    @media (max-width: 720px){
      body{ padding: 40px 18px 80px; }
      h1{ font-size: 36px; }
      .tagline{ font-size: 17px; }

      .pillars{
        flex-direction: column;
        border-radius: 18px;
        max-width: 420px;
      }
      .pillar + .pillar{
        border-left: none;
        border-top: 1px solid var(--divider);
      }

      .chat-block{ margin-top: 120px; }
      .chat-wrapper iframe{ height: 320px; }
      footer{ margin-top: 34px; }
    }
  </style>
</head>
