<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ben genin</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --text-primary: #222;
      --text-secondary: #666;
      --text-tertiary: #888;
      --divider-color: rgba(0,0,0,0.18);
      --border-color: rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 22px rgba(0,0,0,0.06);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --linkedin-blue: #0A66C2;
      --github-black: #111;
      --nav-hover-bg: #111;
      --nav-hover-text: #fff;
      --toggle-surface: #f7f7f7;
      --toggle-track-off: #d2d2d2;
      --toggle-track-on: #2ac157;
      --toggle-thumb: #fff;
    }

    html {
      scroll-behavior: smooth;
    }

    body[data-theme="dark"] {
      --bg-primary: #07090d;
      --bg-secondary: #0f131b;
      --text-primary: #eceef5;
      --text-secondary: #b3bac7;
      --text-tertiary: #8e96a6;
      --divider-color: rgba(255,255,255,0.16);
      --border-color: rgba(255,255,255,0.09);
      --shadow-lg: 0 10px 24px rgba(0,0,0,0.42);
      --shadow-sm: 0 2px 6px rgba(0,0,0,0.28);
      --github-black: #eceef5;
      --nav-hover-bg: #f4f6ff;
      --nav-hover-text: #0b1020;
      --toggle-surface: #0a0f17;
      --toggle-track-off: #2a3140;
      --toggle-track-on: #2ac157;
      --toggle-thumb: #fff;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 17px;
      letter-spacing: 0.2px;
      padding: 32px 20px 100px;
      text-align: center;
      transition: background-color 200ms ease, color 200ms ease;
    }

    .theme-toggle-wrap {
      max-width: 980px;
      margin: 0 auto 14px;
      display: flex;
      justify-content: flex-start;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      background: var(--toggle-surface);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      user-select: none;
      transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .theme-toggle svg {
      width: 15px;
      height: 15px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .theme-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      min-width: 70px;
      text-align: left;
    }

    .theme-switch {
      appearance: none;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      border: none;
      background: var(--toggle-track-off);
      position: relative;
      margin: 0;
      cursor: pointer;
      transition: background-color 180ms ease;
    }

    .theme-switch::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--toggle-thumb);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform 180ms ease;
    }

    .theme-switch:checked {
      background: var(--toggle-track-on);
    }

    .theme-switch:checked::before {
      transform: translateX(18px);
    }

    h1 {
      font-size: 42px;
      font-weight: 300;
      margin: 0;
      letter-spacing: -0.4px;
    }

    h1 strong {
      font-weight: 600;
    }

    .tagline {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
      font-size: 18px;
      font-weight: 300;
      line-height: 1.45;
    }

    .tagline .line {
      max-width: 980px;
    }

    .current-role {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .current-role a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      vertical-align: middle;
    }

    .tagline-icon {
      margin-left: 4px;
      vertical-align: -2px;
    }

    nav {
      margin-top: 34px;
    }

    /* DESKTOP NAV */
    .nav-row {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item {
      min-width: 180px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.2px;
      border-radius: 10px;
      transition: background 160ms ease, color 160ms ease, opacity 160ms ease;
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      background: var(--nav-hover-bg);
      color: var(--nav-hover-text);
      outline: none;
    }

    .nav-divider {
      width: 1px;
      height: 46px;
      background: var(--divider-color);
      margin: 0 14px;
      flex-shrink: 0;
    }

    .link-icon {
      margin-left: 4px;
      vertical-align: -2px;
      flex-shrink: 0;
      transition: fill 160ms ease;
    }

    .nav-item .link-icon.icon-linkedin {
      fill: var(--linkedin-blue);
    }

    .nav-item .link-icon.icon-github {
      fill: var(--github-black);
    }

    .nav-item:hover .link-icon,
    .nav-item:focus-visible .link-icon {
      fill: var(--nav-hover-text);
    }

    .emoji-icon {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* CTA hidden on desktop */
    .cta {
      display: none;
      margin-top: 24px;
      align-items: center;
      justify-content: center;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.14);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: background 0.18s ease, opacity 0.18s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: color-mix(in srgb, var(--bg-secondary) 70%, var(--text-primary) 30%);
      opacity: 0.95;
      outline: none;
    }

    .chat-block {
      margin-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }

    .chat-wrapper iframe {
      width: 100%;
      height: 340px;
      border: 0;
    }

    footer {
      margin-top: 46px;
    }

    .footer-emoji {
      font-size: 28px;
      opacity: 0.9;
    }

    .footer-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.2px;
    }

    @media (max-width: 720px) {
      .theme-toggle-wrap {
        margin-bottom: 8px;
      }

      .theme-toggle {
        gap: 8px;
        padding: 5px 8px;
      }

      .theme-label {
        font-size: 12px;
        min-width: 64px;
      }

      .theme-switch {
        width: 38px;
        height: 22px;
      }

      .theme-switch::before {
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
      }

      .theme-switch:checked::before {
        transform: translateX(16px);
      }

      body {
        padding: 18px 18px 80px;
      }

      h1 {
        font-size: 34px;
      }

      .tagline {
        font-size: 15px;
        gap: 10px;
      }

      nav {
        margin-top: 24px;
      }

      .nav-row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .nav-item {
        min-width: 0;
        padding: 4px 0;
        font-size: 18px;
        border-radius: 0;
      }

      .nav-item:hover,
      .nav-item:focus-visible {
        background: transparent;
        color: var(--text-primary);
        opacity: 0.7;
      }

      .nav-item:hover .link-icon.icon-linkedin,
      .nav-item:focus-visible .link-icon.icon-linkedin {
        fill: var(--linkedin-blue);
      }

      .nav-item:hover .link-icon.icon-github,
      .nav-item:focus-visible .link-icon.icon-github {
        fill: var(--github-black);
      }

      .nav-divider {
        display: none;
      }

      .emoji-icon {
        font-size: 18px;
      }

      /* CTA visible on mobile only */
      .cta {
        display: inline-flex;
        margin-top: 22px;
      }

      .chat-block {
        margin-top: 120px;
      }

      .chat-wrapper iframe {
        height: 320px;
      }

      footer {
        margin-top: 34px;
      }
    }
  </style>
</head>

<body>

    <section id="chat-section" class="chat-block" aria-label="Interactive chat">

          src="https://www.chatbase.co/chatbot-iframe/7WKehRDT0GFL74DSSIm8h"

  <script>
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const savedTheme = localStorage.getItem("theme");
    const themeSwitch = document.getElementById("theme-switch");
    const themeLabel = document.getElementById("theme-label");
    const themeIconPath = document.getElementById("theme-icon-path");

    const sunPath = "M12 3v2m0 14v2m9-9h-2M5 12H3m15.36 6.36-1.41-1.41M7.05 7.05 5.64 5.64m12.72 0-1.41 1.41M7.05 16.95l-1.41 1.41M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z";
    const moonPath = "M21 12.79A9 9 0 1 1 11.21 3c0 .35-.03.7-.08 1.04A7 7 0 0 0 19.96 12c.35-.05.69-.08 1.04-.08Z";

    const setTheme = (theme) => {
      const isDark = theme === "dark";
      document.body.setAttribute("data-theme", theme);
      themeSwitch.checked = isDark;
      themeLabel.textContent = isDark ? "Dark Mode" : "Light Mode";
      themeIconPath.setAttribute("d", isDark ? moonPath : sunPath);
      localStorage.setItem("theme", theme);
    };

    setTheme(savedTheme || (prefersDark ? "dark" : "light"));
    themeSwitch.addEventListener("change", () => {
      setTheme(themeSwitch.checked ? "dark" : "light");
    });
  </script>
</body>
</html>
