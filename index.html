<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ben genin</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-hover: #f0f0f0;
      --text-primary: #222;
      --text-secondary: #666;
      --text-tertiary: #888;
      --text-muted: #999;
      --border-color: rgba(0,0,0,0.08);
      --divider-color: rgba(0,0,0,0.22);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 22px rgba(0,0,0,0.06);
      --linkedin-blue: #0A66C2;
      --github-black: #111;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      font-size: 17px;
      letter-spacing: 0.35px;
      padding: 60px 20px 100px;
      text-align: center;
    }

    h1 {
      font-size: 44px;
      font-weight: 300;
      margin: 0;
      letter-spacing: -0.4px;
    }

    h1 strong {
      font-weight: 600;
    }

    .tagline {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--text-secondary);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.25px;
      line-height: 1.5;
    }

    .tagline .line {
      max-width: 980px;
    }

    .current-role {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .current-role a {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      vertical-align: middle;
    }

    .tagline-icon {
      margin-left: 4px;
      vertical-align: -2px;
    }

    nav {
      margin-top: 40px;
    }

    .nav-row {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .nav-item {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.35px;
      transition: background 180ms ease, color 180ms ease;
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      background: #111;
      color: #fff;
      outline: none;
    }

    .nav-divider {
      width: 1px;
      background: var(--divider-color);
      margin: 10px 0;
    }

    .link-icon {
      margin-left: 4px;
      vertical-align: -2px;
      flex-shrink: 0;
    }

    .emoji-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .cta {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.25px;
      cursor: pointer;
      transition: opacity 0.18s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      opacity: 0.65;
      outline: none;
    }

    .chat-block {
      margin-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 760px;
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }

    .chat-wrapper iframe {
      width: 100%;
      height: 340px;
      border: 0;
    }

    footer {
      margin-top: 46px;
    }

    .footer-emoji {
      font-size: 28px;
      opacity: 0.9;
    }

    .footer-text {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-tertiary);
      letter-spacing: 0.2px;
    }

    @media (max-width: 720px) {
      body {
        padding: 40px 18px 80px;
      }

      h1 {
        font-size: 36px;
      }

      .tagline {
        font-size: 17px;
      }

      nav {
        margin-top: 26px;
      }

      .nav-row {
        flex-direction: column;
        max-width: 420px;
      }

      .nav-item {
        padding: 14px 14px;
        font-size: 20px;
      }

      .nav-divider {
        width: 100%;
        height: 1px;
        margin: 0;
      }

      .chat-block {
        margin-top: 120px;
      }

      .chat-wrapper iframe {
        height: 320px;
      }

      footer {
        margin-top: 34px;
      }
    }
  </style>
</head>
