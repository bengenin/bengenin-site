<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ben genin</title>

  <!-- 🐣 Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>">

  <!-- Gentle / elegant typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #fafafa;
      --text: #222;
      --muted: #666;
      --divider: rgba(0,0,0,0.25);
      --linkedin: #0A66C2;
    }

    html { scroll-behavior: smooth; }

    body{
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      font-size: 17px;
      letter-spacing: 0.35px;
      padding: 60px 20px 100px;
      text-align:center;
    }

    h1{
      font-size: 44px;
      font-weight: 300;
      margin:0;
      letter-spacing: -0.4px;
    }
    h1 strong{ font-weight: 600; }

    .tagline{
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.25px;
      line-height: 1.5;
    }

    .tagline .line{
      max-width: 860px;
    }

    .current-role{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .current-role a{
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      vertical-align: middle;
    }

    .current-role svg{
      margin-left: 4px;
      vertical-align: -2px;
    }

    /* Elegant nav row (desktop) */
    nav{ margin-top: 44px; }

    .nav-row{
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .nav-item{
      flex: 1;
      padding: 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      text-decoration: none;
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.35px;

      transition: background 180ms ease, color 180ms ease, opacity 180ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:focus-visible{
      outline: 2px solid rgba(0,0,0,0.65);
      outline-offset: 2px;
    }

    .nav-item:hover{
      background: #111;
      color: #fff;
    }

    .nav-divider{
      width: 1px;
      background: var(--divider);
      margin: 10px 0;
    }

    .nav-item .emoji{
      font-size: 22px;
      line-height: 1;
    }

    /* CTA (kept subtle) */
    .cta{
      margin-top: 26px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 6px 14px;

      border-radius: 999px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.14);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .cta:hover{ background: #f0f0f0; opacity: 0.95; }
    .cta:focus-visible{ outline: 2px solid #111; outline-offset: 2px; }

    /* Chat section */
    .chat-block{
      margin-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-wrapper{
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .chat-wrapper iframe{
      width: 100%;
      height: 340px;
      border: 0;
    }

    footer{ margin-top: 46px; }
    .footer-emoji{ font-size: 28px; opacity: 0.9; }
    .footer-text{ margin-top: 12px; font-size: 13px; color: #888; letter-spacing: 0.2px; }

    /* Mobile: stack nav into a list (no big blocks) */
    @media (max-width: 720px){
      body{ padding: 40px 18px 80px; }
      h1{ font-size: 36px; }
      .tagline{ font-size: 17px; }

      nav{ margin-top: 26px; }

      .nav-row{
        flex-direction: column;
        max-width: 420px;
      }

      .nav-item{
        padding: 14px 14px;
        font-size: 20px;
      }

      .nav-divider{
        width: 100%;
        height: 1px;
        margin: 0;
      }

      .chat-block{ margin-top: 120px; }
      .chat-wrapper iframe{ height: 320px; }
      footer{ margin-top: 34px; }
    }
  </style>
</head>

<body>
  <header>
    <h1><strong>ben</strong>genin</h1>

    <div class="tagline">
      <div class="line">
        Senior Account Executive with 7+ years experience in consultative B2B sales and go-to-market strategies.
      </div>

      <div class="current-role">
        <span>Currently: Lead AE @ LinkedIn</span>
        <a href="https://www.linkedin.com/in/ben-genin/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Profile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--linkedin)" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M4.98 3.5C4.98 4.61 4.09 5.5 2.98 5.5C1.87 5.5 0.98 4.61 0.98 3.5C0.98 2.39 1.87 1.5 2.98 1.5C4.09 1.5 4.98 2.39 4.98 3.5ZM0.99 8H4.99V23H0.99V8ZM8.99 8H12.79V10.02H12.85C13.38 9.08 14.64 8 16.62 8C21.1 8 22 10.94 22 15.05V23H18V15.93C18 13.8 17.96 11.12 15.29 11.12C12.59 11.12 12.2 13.39 12.2 15.78V23H8.2V8H8.99Z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <nav aria-label="Main navigation">
    <div class="nav-row">
      <a class="nav-item"
         href="mailto:ben.genin8@gmail.com?subject=Resume%20request&body=Hi%20Ben,%0A%0AI%20would%20like%20to%20receive%20a%20copy%20of%20your%20resume.%0A%0AThanks,%0A%3CName%3E%0A%3CCompany%3E%0A%3CEmail%3E">
        <span>cv</span><span class="emoji">📝</span>
      </a>

      <div class="nav-divider" aria-hidden="true"></div>

      <a class="nav-item" href="https://www.linkedin.com/in/ben-genin/" target="_blank" rel="noopener noreferrer">
        <span>linkedin</span><span class="emoji">🤝</span>
      </a>

      <div class="nav-divider" aria-hidden="true"></div>

      <a class="nav-item"
         href="mailto:ben.genin8@gmail.com?subject=Website%20inquiry&body=Hi%20Ben,%0A%0AReaching%20out%20from%20your%20website.%0A%0A%3CYour%20message%3E%0A%0AThanks,%0A%3CName%3E%0A%3CCompany%3E%0A%3CEmail%3E">
        <span>contact</span><span class="emoji">✉️</span>
      </a>

      <div class="nav-divider" aria-hidden="true"></div>

      <a class="nav-item" href="https://github.com/bengenin" target="_blank" rel="noopener noreferrer">
        <span>github</span><span class="emoji">💻</span>
      </a>
    </div>
  </nav>

  <main>
    <button class="cta"
            type="button"
            onclick="document.getElementById('chat-section').scrollIntoView({ behavior: 'smooth' })"
            aria-label="Scroll to chat section">
      Ask me anything about Ben
    </button>

    <section id="chat-section" class="chat-block" aria-label="Interactive chat">
      <div class="chat-wrapper">
        <iframe
          src="https://www.chatbase.co/chatbot-iframe/7WKehRDT0GFL74DSSIm8h"
          title="Chat with Ben's AI assistant"
        ></iframe>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-emoji">🎾</div>
    <div class="footer-text">© 2025 Ben Genin · Built with Vercel</div>
  </footer>
</body>
</html>
