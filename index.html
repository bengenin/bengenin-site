<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ben genin</title>

  <!-- 🐣 Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐣</text></svg>">

  <!-- Gentle font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-hover: #f0f0f0;
      --text-primary: #222;
      --text-secondary: #555;
      --text-tertiary: #888;
      --text-muted: #999;
      --border-color: rgba(0,0,0,0.06);
      --border-input: rgba(0,0,0,0.14);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 4px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 22px rgba(0,0,0,0.06);
      --linkedin-blue: #0A66C2;
      --github-black: #222;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 17px;
      letter-spacing: 0.1px;
      padding: 60px 20px 100px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      font-weight: 300;
      margin: 0;
      letter-spacing: -0.6px;
    }
    h1 strong { font-weight: 700; }

    .tagline {
      margin-top: 18px;
      color: var(--text-secondary);
      font-size: 18px;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.45;
    }

    .tagline a { vertical-align: middle; }
    .tagline-icon { margin-left: 4px; }

    nav { margin-top: 32px; }

    .links-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .links-row .divider {
      width: 1px;
      height: 22px;
      background: var(--text-muted);
      opacity: 0.4;
    }

    .link {
      font-size: 20px;
      text-decoration: none;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s ease;
    }
    .link:hover { opacity: 0.7; }

    .link-icon {
      margin-left: 4px;
      vertical-align: -2px;
    }

    /* CTA pill */
    .cta {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: inherit;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 6px 14px;

      border-radius: 999px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-input);
      box-shadow: var(--shadow-sm);
      transition: background 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .cta:hover {
      background: var(--bg-hover);
      box-shadow: var(--shadow-md);
      opacity: 0.9;
    }

    .cta:focus-visible {
      outline: 2px solid var(--text-primary);
      outline-offset: 2px;
    }

    /* Chat section */
    .chat-block {
      margin-top: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 640px;
      background: var(--bg-secondary);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }

    .chat-wrapper iframe {
      width: 100%;
      height: 420px;
      border: 0;
    }

    footer { margin-top: 50px; }

    .footer-emoji {
      font-size: 30px;
      opacity: 0.9;
    }

    .footer-text {
      margin-top: 14px;
      font-size: 14px;
      color: var(--text-tertiary);
    }

    @media (max-width: 640px) {
      body { padding: 40px 18px 80px; }
      h1 { font-size: 34px; }
      .tagline { font-size: 17px; }

      .links-row {
        flex-direction: column;
        gap: 10px;
      }
      .links-row .divider { display: none; }
      .link { font-size: 19px; }

      .cta { margin-top: 34px; }

      .chat-block { margin-top: 120px; }
      .chat-wrapper iframe { height: 360px; }
      footer { margin-top: 36px; }
    }
  </style>
</head>
